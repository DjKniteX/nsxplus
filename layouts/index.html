{{ define "main" }}

<h1>{{ .Title }}</h1>

<div class="content-body">
  {{ .Content }}
</div>

<h2>Latest Posts</h2>

{{ $latest := first 2 (where .Site.RegularPages "Section" "blog") }}
{{ range $latest }}

<h3><a href="{{ .RelPermalink }}">{{ .Title }}</a></h3>

<p><small>{{ .Date.Format "Jan 2, 2006" }}</small></p>

<p>{{ .Summary }}</p>

<p><a href="{{ .RelPermalink }}">Read full post →</a></p>

{{ end }}

{{ end }}
